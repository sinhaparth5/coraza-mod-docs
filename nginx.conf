server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets (JS, CSS, HTML, JSON, SVG)
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # Docusaurus pre-renders every route as <route>/index.html.
    # try_files: serve the exact file, then the directory's index.html,
    # then fall through to the Docusaurus 404 page.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Docusaurus content-hashes asset filenames — cache them for 1 year.
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # sitemap and robots.txt must never be cached so search engines
    # always fetch the latest version.
    location ~* ^/(sitemap\.xml|robots\.txt)$ {
        expires -1;
        add_header Cache-Control "no-store";
    }
}
